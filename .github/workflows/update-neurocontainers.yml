name: Update neurocontainers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/update-neurocontainers.yml'
      - 'neurodesk/apps.json'
      - 'neurodesk/write_log.py'

# Prevent race conditions when multiple PRs are merged in quick succession.
# This ensures only one instance of this workflow runs at a time.
# If a second trigger occurs while the first is running, the older run is cancelled.
concurrency:
  group: update-neurocontainers
  cancel-in-progress: true

jobs:
  upload_containers_simg:
    runs-on: self-hosted
    permissions:
      id-token: write
      contents: read
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      with:
        token: ${{ secrets.ACCESS_TOKEN }}
        ref: main
        fetch-depth: 0
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: 3.8
    - name: Configure AWS Credentials 1
      id: creds
      uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
      with:
        aws-region: us-east-2
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        output-credentials: true
        role-duration-seconds: 28800 # 8 hours
    - name : Check if singularity container files exist in nectar cloud and build & upload if not there
      env:
        AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
        AWS_SESSION_TOKEN: ${{ env.AWS_SESSION_TOKEN }}
        OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
        OS_PROJECT_NAME: ${{ secrets.OS_PROJECT_NAME }}
        OS_PROJECT_ID: ${{ secrets.OS_PROJECT_ID }}
        OS_USERNAME: ${{ secrets.OS_USERNAME }}
        OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
        OS_APPLICATION_CREDENTIAL_ID: ${{ secrets.OS_APPLICATION_CREDENTIAL_ID }}
        OS_APPLICATION_CREDENTIAL_SECRET: ${{ secrets.OS_APPLICATION_CREDENTIAL_SECRET }}
        OS_AUTH_VERSION: ${{ secrets.OS_AUTH_VERSION }}
        OS_IDENTITY_API_VERSION: ${{ secrets.OS_IDENTITY_API_VERSION }}
      run: |
        rclone config create nectar swift env_auth true
        rclone config create aws-neurocontainers-new s3 config_is_local false provider AWS env_auth true region us-east-2 no_check_bucket true
        /bin/bash .github/workflows/upload_containers_simg.sh
