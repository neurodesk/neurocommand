name: Build neurocommand image

# Daily build at 17:00 UTC, matching neurodesktop's cadence so both images
# pick up the same day's CVMFS config refresh and apt updates.
# Manual run: https://github.com/neurodesk/neurocommand/actions/workflows/build-image.yml

permissions:
  contents: write
  issues: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      force_push:
        description: "Force push?"
        type: boolean
        required: true
        default: false
      test_tag:
        description: "Publish to a one-off test tag (e.g. 'py-stack'). Skips :latest, :YYYY-MM-DD, DockerHub, git tag. Use for branch testing."
        type: string
        required: false
        default: ""
  # schedule:
  #   - cron: "0 17 * * *"

env:
  DOCKERHUB_ORG: ${{ vars.DOCKERHUB_ORG }}

jobs:
  build-image:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        platform:
          - arch: amd64
            docker_platform: linux/amd64
          - arch: arm64
            docker_platform: linux/arm64
    steps:
      - name: Configure runner
        run: |
          sudo mkdir -p /mnt/docker
          echo '{"data-root": "/mnt/docker", "dns": ["8.8.8.8", "1.1.1.1"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}
      - name: Set environment variables
        run: |
          IMAGENAME="neurocommand"
          BUILDDATE=`date +%Y-%m-%d`
          IMAGEID=ghcr.io/$GITHUB_REPOSITORY
          IMAGEID=$(echo $IMAGEID | tr '[A-Z]' '[a-z]')
          TEST_TAG="${{ inputs.test_tag }}"
          if [ -n "$TEST_TAG" ]; then
            ARCH_TAG="test-${TEST_TAG}-${{ matrix.platform.arch }}"
          else
            ARCH_TAG="${{ matrix.platform.arch }}"
          fi
          echo "BUILDDATE=$BUILDDATE" >> $GITHUB_ENV
          echo "IMAGEID=$IMAGEID" >> $GITHUB_ENV
          echo "IMAGENAME=$IMAGENAME" >> $GITHUB_ENV
          echo "TEST_TAG=$TEST_TAG" >> $GITHUB_ENV
          echo "ARCH_TAG=$ARCH_TAG" >> $GITHUB_ENV
      - name: Check if image exists
        if: github.event_name == 'schedule'
        id: check_image
        run: |
          if docker manifest inspect $IMAGEID:$BUILDDATE > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Set up QEMU
        if: matrix.platform.arch == 'arm64' && steps.check_image.outputs.exists != 'true'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
      - name: Set up Docker Buildx
        if: steps.check_image.outputs.exists != 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      - name: Login to GHCR
        if: steps.check_image.outputs.exists != 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push arch image
        if: steps.check_image.outputs.exists != 'true'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: docker
          platforms: ${{ matrix.platform.docker_platform }}
          provenance: false
          push: true
          tags: ${{ env.IMAGEID }}:${{ env.ARCH_TAG }}
          build-args: |
            NEUROCOMMAND_VERSION=${{ env.BUILDDATE }}
            BUILD_DATE=${{ env.BUILDDATE }}
            VCS_REF=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGEID }}:latest
          cache-to: type=inline
      - name: Generate issue on job failure
        if: always() && failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          title="Job failure - ${GITHUB_WORKFLOW}"
          body="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          issue_number="$(gh issue list --state open --label bug --search "${title} in:title" --json number --jq '.[0].number // ""')"
          if [ -n "${issue_number}" ]; then
            gh issue edit "${issue_number}" --body "${body}"
          else
            gh issue create --title "${title}" --body "${body}" --label bug
          fi

  merge-manifests:
    needs: build-image
    runs-on: ubuntu-24.04
    steps:
      - name: Set environment variables
        run: |
          IMAGENAME="neurocommand"
          BUILDDATE=`date +%Y-%m-%d`
          IMAGEID=ghcr.io/$GITHUB_REPOSITORY
          IMAGEID=$(echo $IMAGEID | tr '[A-Z]' '[a-z]')
          TEST_TAG="${{ inputs.test_tag }}"
          echo "BUILDDATE=$BUILDDATE" >> $GITHUB_ENV
          echo "IMAGEID=$IMAGEID" >> $GITHUB_ENV
          echo "IMAGENAME=$IMAGENAME" >> $GITHUB_ENV
          echo "TEST_TAG=$TEST_TAG" >> $GITHUB_ENV
      - name: Check if image exists
        if: github.event_name == 'schedule'
        id: check_image
        run: |
          if docker manifest inspect $IMAGEID:$BUILDDATE > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Set up Docker Buildx
        if: steps.check_image.outputs.exists != 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      - name: Login to GHCR
        if: steps.check_image.outputs.exists != 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to DockerHub
        if: ${{ env.DOCKERHUB_ORG != '' && env.TEST_TAG == '' && steps.check_image.outputs.exists != 'true' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Create and push multi-arch manifest to GHCR
        if: steps.check_image.outputs.exists != 'true'
        run: |
          if [ -n "${TEST_TAG}" ]; then
            docker buildx imagetools create \
              -t ${IMAGEID}:${TEST_TAG} \
              ${IMAGEID}:test-${TEST_TAG}-amd64 \
              ${IMAGEID}:test-${TEST_TAG}-arm64
          else
            docker buildx imagetools create \
              -t ${IMAGEID}:${BUILDDATE} \
              -t ${IMAGEID}:latest \
              ${IMAGEID}:amd64 \
              ${IMAGEID}:arm64
          fi
      - name: Install crane
        if: ${{ env.DOCKERHUB_ORG != '' && env.TEST_TAG == '' && steps.check_image.outputs.exists != 'true' }}
        run: |
          curl -sL https://github.com/google/go-containerregistry/releases/download/v0.20.2/go-containerregistry_Linux_x86_64.tar.gz \
            | sudo tar -xz -C /usr/local/bin crane
          crane version
      - name: Copy multi-arch manifest to DockerHub
        if: ${{ env.DOCKERHUB_ORG != '' && env.TEST_TAG == '' && steps.check_image.outputs.exists != 'true' }}
        run: |
          crane copy \
            ${{ env.IMAGEID }}:${{ env.BUILDDATE }} \
            ${{ env.DOCKERHUB_ORG }}/${{ env.IMAGENAME }}:${{ env.BUILDDATE }}
          crane copy \
            ${{ env.IMAGEID }}:latest \
            ${{ env.DOCKERHUB_ORG }}/${{ env.IMAGENAME }}:latest
      - name: Create github tag
        if: github.ref == 'refs/heads/main' && env.TEST_TAG == '' && steps.check_image.outputs.exists != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method DELETE -H "Accept: application/vnd.github+json" \
            /repos/${GITHUB_REPOSITORY}/git/refs/tags/${BUILDDATE} 2>/dev/null || true
          gh api --method POST -H "Accept: application/vnd.github+json" \
            /repos/${GITHUB_REPOSITORY}/git/refs \
            -f ref="refs/tags/${BUILDDATE}" -f sha="${GITHUB_SHA}"
      - name: Write image publish summary
        run: |
          if [ "${{ steps.check_image.outputs.exists }}" = "true" ]; then
            RESULT="Image already existed; build and registry push were skipped."
          elif [ "${{ env.DOCKERHUB_ORG }}" = "" ]; then
            RESULT="Built and pushed to GHCR."
          else
            RESULT="Built and pushed to GHCR and DockerHub."
          fi
          {
            echo "## Image publish summary"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Result | ${RESULT} |"
            echo "| Version | \`${{ env.BUILDDATE }}\` |"
            echo "| Source commit | \`${GITHUB_SHA}\` |"
            echo "| GHCR image | \`${{ env.IMAGEID }}:${{ env.BUILDDATE }}\`, \`${{ env.IMAGEID }}:latest\` |"
            if [ "${{ env.DOCKERHUB_ORG }}" != "" ]; then
              echo "| DockerHub image | \`${{ env.DOCKERHUB_ORG }}/${{ env.IMAGENAME }}:${{ env.BUILDDATE }}\`, \`${{ env.DOCKERHUB_ORG }}/${{ env.IMAGENAME }}:latest\` |"
            else
              echo "| DockerHub image | Not configured; \`DOCKERHUB_ORG\` is empty. |"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
      - name: Checkout repository for failure issue template
        if: always() && failure()
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}
      - name: Generate issue on job failure
        if: always() && failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          title="Job failure - ${GITHUB_WORKFLOW}"
          body="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          issue_number="$(gh issue list --state open --label bug --search "${title} in:title" --json number --jq '.[0].number // ""')"
          if [ -n "${issue_number}" ]; then
            gh issue edit "${issue_number}" --body "${body}"
          else
            gh issue create --title "${title}" --body "${body}" --label bug
          fi
