name: Build neurocommand image

# Daily build at 17:00 UTC, matching neurodesktop's cadence so both images
# pick up the same day's CVMFS config refresh and apt updates.
# Manual run: https://github.com/neurodesk/neurocommand/actions/workflows/build-image.yml

permissions:
  contents: write
  issues: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      force_push:
        description: "Force push?"
        type: boolean
        required: true
        default: false
  schedule:
    - cron: "0 17 * * *"

env:
  DOCKERHUB_ORG: ${{ vars.DOCKERHUB_ORG }}

jobs:
  build-image:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        platform:
          - arch: amd64
            docker_platform: linux/amd64
          - arch: arm64
            docker_platform: linux/arm64
    steps:
      - name: Configure runner
        run: |
          sudo mkdir -p /mnt/docker
          echo '{"data-root": "/mnt/docker"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.ref }}
      - name: Set environment variables
        run: |
          IMAGENAME="neurocommand"
          BUILDDATE=`date +%Y-%m-%d`
          IMAGEID=ghcr.io/$GITHUB_REPOSITORY
          IMAGEID=$(echo $IMAGEID | tr '[A-Z]' '[a-z]')
          echo "BUILDDATE=$BUILDDATE" >> $GITHUB_ENV
          echo "IMAGEID=$IMAGEID" >> $GITHUB_ENV
          echo "IMAGENAME=$IMAGENAME" >> $GITHUB_ENV
      - name: Check if image exists
        if: github.event_name == 'schedule'
        id: check_image
        run: |
          if docker manifest inspect $IMAGEID:$BUILDDATE > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Set up QEMU
        if: steps.check_image.outputs.exists != 'true'
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392
      - name: Set up Docker Buildx
        if: steps.check_image.outputs.exists != 'true'
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2
      - name: Login to GHCR
        if: steps.check_image.outputs.exists != 'true'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push arch image
        if: steps.check_image.outputs.exists != 'true'
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          context: docker
          platforms: ${{ matrix.platform.docker_platform }}
          provenance: false
          push: true
          tags: ${{ env.IMAGEID }}:${{ matrix.platform.arch }}
          build-args: |
            NEUROCOMMAND_VERSION=${{ env.BUILDDATE }}
            BUILD_DATE=${{ env.BUILDDATE }}
            VCS_REF=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGEID }}:latest
          cache-to: type=inline
      - name: Generate issue on job failure
        if: always() && failure()
        uses: JasonEtco/create-an-issue@1b14a70e4d8dc185e5cc76d3bec9eab20257b2c5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        with:
          filename: .github/job_failure_issue_template.md
          update_existing: true
          search_existing: open

  merge-manifests:
    needs: build-image
    runs-on: ubuntu-24.04
    steps:
      - name: Set environment variables
        run: |
          IMAGENAME="neurocommand"
          BUILDDATE=`date +%Y-%m-%d`
          IMAGEID=ghcr.io/$GITHUB_REPOSITORY
          IMAGEID=$(echo $IMAGEID | tr '[A-Z]' '[a-z]')
          echo "BUILDDATE=$BUILDDATE" >> $GITHUB_ENV
          echo "IMAGEID=$IMAGEID" >> $GITHUB_ENV
          echo "IMAGENAME=$IMAGENAME" >> $GITHUB_ENV
      - name: Check if image exists
        if: github.event_name == 'schedule'
        id: check_image
        run: |
          if docker manifest inspect $IMAGEID:$BUILDDATE > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Set up Docker Buildx
        if: steps.check_image.outputs.exists != 'true'
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2
      - name: Login to GHCR
        if: steps.check_image.outputs.exists != 'true'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to DockerHub
        if: ${{ env.DOCKERHUB_ORG != '' && steps.check_image.outputs.exists != 'true' }}
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Create and push multi-arch manifest to GHCR
        if: steps.check_image.outputs.exists != 'true'
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGEID }}:${{ env.BUILDDATE }} \
            -t ${{ env.IMAGEID }}:latest \
            ${{ env.IMAGEID }}:amd64 \
            ${{ env.IMAGEID }}:arm64
      - name: Install crane
        if: ${{ env.DOCKERHUB_ORG != '' && steps.check_image.outputs.exists != 'true' }}
        run: |
          curl -sL https://github.com/google/go-containerregistry/releases/download/v0.20.2/go-containerregistry_Linux_x86_64.tar.gz \
            | sudo tar -xz -C /usr/local/bin crane
          crane version
      - name: Copy multi-arch manifest to DockerHub
        if: ${{ env.DOCKERHUB_ORG != '' && steps.check_image.outputs.exists != 'true' }}
        run: |
          crane copy \
            ${{ env.IMAGEID }}:${{ env.BUILDDATE }} \
            ${{ env.DOCKERHUB_ORG }}/${{ env.IMAGENAME }}:${{ env.BUILDDATE }}
          crane copy \
            ${{ env.IMAGEID }}:latest \
            ${{ env.DOCKERHUB_ORG }}/${{ env.IMAGENAME }}:latest
      - name: Create github tag
        if: steps.check_image.outputs.exists != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method DELETE -H "Accept: application/vnd.github+json" \
            /repos/${GITHUB_REPOSITORY}/git/refs/tags/${BUILDDATE} 2>/dev/null || true
          gh api --method POST -H "Accept: application/vnd.github+json" \
            /repos/${GITHUB_REPOSITORY}/git/refs \
            -f ref="refs/tags/${BUILDDATE}" -f sha="${GITHUB_SHA}"
      - name: Write image publish summary
        run: |
          if [ "${{ steps.check_image.outputs.exists }}" = "true" ]; then
            RESULT="Image already existed; build and registry push were skipped."
          elif [ "${{ env.DOCKERHUB_ORG }}" = "" ]; then
            RESULT="Built and pushed to GHCR."
          else
            RESULT="Built and pushed to GHCR and DockerHub."
          fi
          {
            echo "## Image publish summary"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Result | ${RESULT} |"
            echo "| Version | \`${{ env.BUILDDATE }}\` |"
            echo "| Source commit | \`${GITHUB_SHA}\` |"
            echo "| GHCR image | \`${{ env.IMAGEID }}:${{ env.BUILDDATE }}\`, \`${{ env.IMAGEID }}:latest\` |"
            if [ "${{ env.DOCKERHUB_ORG }}" != "" ]; then
              echo "| DockerHub image | \`${{ env.DOCKERHUB_ORG }}/${{ env.IMAGENAME }}:${{ env.BUILDDATE }}\`, \`${{ env.DOCKERHUB_ORG }}/${{ env.IMAGENAME }}:latest\` |"
            else
              echo "| DockerHub image | Not configured; \`DOCKERHUB_ORG\` is empty. |"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
      - name: Checkout repository for failure issue template
        if: always() && failure()
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.ref }}
      - name: Generate issue on job failure
        if: always() && failure()
        uses: JasonEtco/create-an-issue@1b14a70e4d8dc185e5cc76d3bec9eab20257b2c5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        with:
          filename: .github/job_failure_issue_template.md
          update_existing: true
          search_existing: open
