name: Test neurocommand
permissions:
  contents: read
  packages: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: test-neurocommand-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test_neurocommand:
    name: test (CVMFS=${{ matrix.cvmfs }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        cvmfs: [enabled, disabled]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull neurocommand image
        run: docker pull ghcr.io/neurodesk/neurocommand:latest
      - name: Make workspace writable by container's jovyan (UID 1000)
        run: sudo chown -R 1000:100 "${{ github.workspace }}"
      - name: Run neurocommand fetch test inside image
        run: |
          CVMFS_ENV=""
          if [ "${{ matrix.cvmfs }}" = "disabled" ]; then
            CVMFS_ENV="-e NEURODESK_CVMFS_DISABLE=1"
          fi
          docker run --rm --privileged $CVMFS_ENV \
            -v "${{ github.workspace }}:/work" -w /work \
            ghcr.io/neurodesk/neurocommand:latest \
            bash -lc '
              set -e
              bash build.sh --cli
              bash install.sh
              bash local/fetch_containers.sh niimath 1.0.0 20240902 niimath
              test -f local/containers/niimath_1.0.0_20240902/niimath_1.0.0_20240902.simg
              test -f local/containers/niimath_1.0.0_20240902/niimath
              echo "[test] OK"
            '
      - name: Restore workspace ownership for cleanup
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}"
