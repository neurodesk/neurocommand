name: Test neurocommand
permissions:
  contents: read
  packages: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: test-neurocommand-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit_tests:
    name: unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install pytest setuptools cairosvg
      - name: Run unit tests
        run: python -m pytest -q

  test_neurocommand:
    name: test (CVMFS=${{ matrix.cvmfs }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        cvmfs: [enabled, disabled]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull neurocommand image
        run: docker pull ghcr.io/neurodesk/neurocommand:latest
      - name: Run neurocommand fetch test inside image
        run: |
          CVMFS_ENV=""
          if [ "${{ matrix.cvmfs }}" = "disabled" ]; then
            CVMFS_ENV="-e NEURODESK_CVMFS_DISABLE=1"
          fi
          docker run --rm --privileged --user=root $CVMFS_ENV \
            -e NB_UID="$(id -u)" -e NB_GID="$(id -g)" \
            -v "${{ github.workspace }}:/work" -w /work \
            ghcr.io/neurodesk/neurocommand:latest \
            bash -lc '
              set -e
              container_root="${NEURODESKTOP_LOCAL_CONTAINERS:-local/containers}"
              bash build.sh --cli
              bash containers.sh all
              bash local/fetch_containers.sh niimath 1.0.0 20240902 niimath
              test -f "${container_root}/niimath_1.0.0_20240902/niimath_1.0.0_20240902.simg"
              test -f "${container_root}/niimath_1.0.0_20240902/niimath"
              echo "[test] OK"
            '
