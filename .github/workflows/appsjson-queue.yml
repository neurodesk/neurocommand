name: Consolidate apps.json queue

on:
  workflow_dispatch:
  schedule:
    # Merge the consolidated PR a few times a day; between ticks the queue
    # only accumulates updates, which keeps notification volume low.
    - cron: '25 */6 * * *'
  push:
    branches:
      - update-apps-json
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - 'neurodesk/apps.json'

concurrency:
  group: appsjson-queue
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  consolidate_appsjson:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        ref: main
        fetch-depth: 0
    - name: Checkout neurocontainers
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        repository: NeuroDesk/neurocontainers
        path: neurocontainers
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: 3.11
    - name: Install icon conversion dependencies
      run: python -m pip install cairosvg
    - name: Consolidate pending apps.json updates
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Merging with GITHUB_TOKEN would not trigger the push workflows on
        # main (update-neurocontainers etc.), so merges use this PAT.
        MERGE_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      run: |
        MERGE_ARGS=""
        # Scheduled and manual runs merge the consolidated PR; PR/push events
        # only fold new updates into it, so bursts of releases collapse into
        # one merge per schedule tick.
        if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          MERGE_ARGS="--merge-consolidated"
        fi
        python3 .github/workflows/scripts/consolidate_appsjson_queue.py \
          --repo "${{ github.repository }}" \
          --base-ref main \
          --target-file neurodesk/apps.json \
          --consolidated-branch bot/appsjson-consolidated \
          --source-branch update-apps-json \
          --neurocontainers-path neurocontainers \
          --icons-dir neurodesk/icons \
          --merge-method squash \
          $MERGE_ARGS
