name: Consolidate apps.json queue

on:
  workflow_dispatch:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - 'neurodesk/apps.json'

concurrency:
  group: appsjson-queue
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  consolidate_appsjson:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        ref: main
        fetch-depth: 0
    - name: Checkout neurocontainers
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        repository: NeuroDesk/neurocontainers
        path: neurocontainers
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: 3.11
    - name: Install icon conversion dependencies
      run: python -m pip install cairosvg
    - name: Consolidate open apps.json pull requests
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python3 .github/workflows/scripts/consolidate_appsjson_queue.py \
          --repo "${{ github.repository }}" \
          --graphql-url "${{ github.graphql_url }}" \
          --base-ref main \
          --target-file neurodesk/apps.json \
          --consolidated-branch bot/appsjson-consolidated \
          --neurocontainers-path neurocontainers \
          --icons-dir neurodesk/icons \
          --enable-auto-merge \
          --auto-merge-method SQUASH
