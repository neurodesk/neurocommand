name: Sync menu categories

on:
  workflow_dispatch:
  schedule:
    - cron: "41 3 * * 1"
  push:
    branches:
      - main
    paths:
      - neurodesk/apps.json
      - .github/workflows/sync-menu-categories.yml
      - .github/workflows/scripts/sync_menu_categories.py

concurrency:
  group: sync-menu-categories
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync_menu_categories:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout neurocommand
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Add missing menu categories
        run: python .github/workflows/scripts/sync_menu_categories.py

      - name: Verify generated category wiring
        run: |
          python -m pip install pytest setuptools
          python -m pytest -q \
            test/test_sync_menu_categories.py \
            test/test_icon_coverage.py

      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: bot/sync-menu-categories
          TITLE: Add missing Neurodesk menu categories
          BODY: |
            Adds categories used by `neurodesk/apps.json` but missing from the Neurodesk menu.

            For each category this updates:

            - the freedesktop menu definition;
            - desktop-directory generation;
            - category icon coverage; and
            - a fallback category icon when no category-specific icon exists.

            This pull request is generated by the `Sync menu categories` workflow.
        run: |
          set -euo pipefail

          paths=(
            neurodesk/neurodesk-applications.menu
            neurodesk/build_menu.py
            test/test_icon_coverage.py
            neurodesk/icons
          )

          if [ -z "$(git status --porcelain -- "${paths[@]}")" ]; then
            echo "No menu category changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "${BRANCH}"
          git add -- "${paths[@]}"
          git commit -m "${TITLE}"

          remote_sha="$(git ls-remote --heads origin "${BRANCH}" | awk '{print $1}')"
          if [ -n "${remote_sha}" ]; then
            git push --force-with-lease="refs/heads/${BRANCH}:${remote_sha}" origin "HEAD:${BRANCH}"
          else
            git push origin "HEAD:${BRANCH}"
          fi

          if gh pr view "${BRANCH}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh pr edit "${BRANCH}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${TITLE}" \
              --body "${BODY}"
          else
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head "${BRANCH}" \
              --title "${TITLE}" \
              --body "${BODY}"
          fi
