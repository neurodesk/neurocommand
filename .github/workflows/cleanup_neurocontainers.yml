name: Cleanup unused neurocontainers

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Update neurocontainers
    types:
      - completed

concurrency:
  group: cleanup-neurocontainers
  cancel-in-progress: true

jobs:
  cleanup_containers_simg:
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      id-token: write
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: 3.8
    - name: Configure AWS Credentials
      id: creds
      uses: aws-actions/configure-aws-credentials@796449b3e38e3c256861227399e58b780e0e5538
      with:
        aws-region: us-east-2
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        output-credentials: true
        role-duration-seconds: 28800 # 8 hours
    - name: clean up containers
      env:
        AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
        AWS_SESSION_TOKEN: ${{ env.AWS_SESSION_TOKEN }}
        OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
        OS_PROJECT_NAME: ${{ secrets.OS_PROJECT_NAME }}
        OS_PROJECT_ID: ${{ secrets.OS_PROJECT_ID }}
        OS_USERNAME: ${{ secrets.OS_USERNAME }}
        OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
        OS_APPLICATION_CREDENTIAL_ID: ${{ secrets.OS_APPLICATION_CREDENTIAL_ID }}
        OS_APPLICATION_CREDENTIAL_SECRET: ${{ secrets.OS_APPLICATION_CREDENTIAL_SECRET }}
        OS_AUTH_VERSION: ${{ secrets.OS_AUTH_VERSION }}
        OS_IDENTITY_API_VERSION: ${{ secrets.OS_IDENTITY_API_VERSION }}
      run: |
        install_with_retry() {
            for i in 1 2 3; do
                "$@" && return 0
                echo "[DEBUG] attempt $i failed, retrying in $((i*10))s..."
                sleep $((i*10))
            done
            return 1
        }
        if ! command -v rclone &> /dev/null; then
            echo "[DEBUG] Installing rclone"
            install_with_retry bash -c 'curl -fsSL https://rclone.org/install.sh | sudo bash'
        fi
        if ! command -v aws &> /dev/null; then
            echo "[DEBUG] Installing AWS CLI"
            install_with_retry bash -c 'curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip" && unzip -o awscliv2.zip && sudo ./aws/install --update && rm -rf aws awscliv2.zip'
        fi
        rclone config create nectar swift env_auth true

        python3 .github/workflows/scripts/cleanup_stale_containers.py \
          --s3-bucket "neurocontainers" \
          --retention-days 7 \
          --apply
